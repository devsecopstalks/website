<div class="submitted">
{{ with $.Param "participants" -}}
  {{- if reflect.IsSlice . -}}
    <span class="author" itemprop="author">{{ delimit . ", " }}</span>
  {{- else -}}
    <a class="author" itemprop="author" href="/about">{{ . }}</a>
  {{- end -}}
 –
{{- end -}}
<time class="created-date" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format ($.Param "dateformat" | default "2 January, 2006") }}</time>
</div>
